<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChiaYu Menu Manager（歷史整合版）</title>

<style>
body { font-family: sans-serif; background:#f5f5f5; }
.toolbar { margin:10px; }
button { margin-right:6px; }
.week { background:#fff; padding:10px; margin:10px; border-radius:6px; }
.history { background:#fff; padding:10px; margin:10px; border-radius:6px; }
</style>
</head>
<body>

<h2 style="margin:10px;">ChiaYu Menu Manager（完整歷史版）</h2>

<div class="toolbar">
  <button onclick="addWeek()">➕ 新增</button>
  <button onclick="saveToHistory()">📌 存成歷史</button>
  <button onclick="clearAll()">🗑️ 清除</button>
</div>

<div id="app"></div>

<div class="history">
  <h3>📜 歷史紀錄</h3>
  <div id="historyList"></div>
</div>

<script>

const STORAGE_KEY = "yupin_menu_v2";
const HISTORY_KEY = "yupin_menu_history_v1";

let data = [];

init();

function init() {
  load();
  render();
  renderHistory();
}

// ===== 主畫面 =====
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "week";

    div.innerHTML = `
      <div>日期：<input value="${w.date || ''}" onchange="updateField(${i}, 'date', this.value)"></div>
      <div>主菜：<input value="${w.main || ''}" onchange="updateField(${i}, 'main', this.value)"></div>
      <div>副主菜：<input value="${w.sub || ''}" onchange="updateField(${i}, 'sub', this.value)"></div>
      <button onclick="removeWeek(${i})">刪除</button>
    `;

    app.appendChild(div);
  });
}

// ===== 操作 =====
function addWeek() {
  data.push({ date:'', main:'', sub:'' });
  save();
  render();
}

function removeWeek(i) {
  data.splice(i,1);
  save();
  render();
}

function updateField(i,key,val) {
  data[i][key] = val;
  save();
}

// ===== 儲存 =====
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw) data = JSON.parse(raw);
}

function clearAll() {
  if(!confirm("確定清除全部？")) return;
  data = [];
  save();
  render();
}

// ===== 歷史 =====
function saveToHistory() {
  if(data.length === 0) {
    alert("沒有資料");
    return;
  }

  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

  history.unshift({
    id: Date.now(),
    time: new Date().toLocaleString(),
    data: JSON.parse(JSON.stringify(data))
  });

  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

  renderHistory();
  alert("✅ 已存成歷史");
}

function renderHistory() {
  const list = document.getElementById("historyList");
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

  list.innerHTML = history.map(h => `
    <div style="border:1px solid #ccc;margin:6px;padding:6px;border-radius:6px;">
      <div style="font-size:0.8rem;color:#666;">📅 ${h.time}</div>
      <button onclick="loadHistory(${h.id})">載入</button>
      <button onclick="deleteHistory(${h.id})">刪除</button>
    </div>
  `).join("");
}

function loadHistory(id) {
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  const target = history.find(h => h.id === id);
  if(!target) return;

  data = JSON.parse(JSON.stringify(target.data));
  save();
  render();
}

function deleteHistory(id) {
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  history = history.filter(h => h.id !== id);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

</script>

</body>
</html>
